<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Pasta Clicker</title>
        <link rel="stylesheet" href="main.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="grid">
            <div class="stats">

            </div>
            <div class="content">
                <div class="meatball-count">
                    <img src="images/meatball.png" width="65px" alt="Meatballs:">
                    <p>0</p>
                </div>
            </div>
            <div class="shop">
                <button class="buy-fork-button">
                    <img src="images/fork-upgrade.png" width="200" alt="Buy Fork">
                    <p><img src="images/meatball.png" width="65px" alt="Cost:"><strong>10</strong></p>
                </button>
            </div>
        </div>

        <div class="fork-container">
            
        </div>

        <button class="click-button">
            <img src="images/pastaBowl.png" width="250px" alt="Pasta Bowl">
        </button>
    </body>
</html>
