<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Pasta Clicker</title>
        <link rel="stylesheet" href="main.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="grid">
            <div class="stats">

            </div>
            <div class="content">
                <div class="meatball-count">
                    <img src="images/meatball.png" width="65px" alt="Meatballs:">
                    <p>0</p>
                </div>
            </div>
            <div class="shop">

            </div>
        </div>

        <div class="fork-container">
            <div class="fork">
                <img src="images/fork.png" width="80px" alt="Fork">
            </div>
            <div class="fork">
                <img src="images/fork.png" width="80px" alt="Fork" style="animation-delay:-4s;">
            </div>
        </div>

        <button class="click-button">
            <img src="images/pastaBowl.png" width="250px" alt="Pasta Bowl">
        </button>
    </body>
</html>
