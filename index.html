<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Pasta Clicker</title>
        <link rel="stylesheet" href="main.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="grid">
            <div class="stats">
                <div>
                    <h1 style="text-align: center;">
                        Stats
                    </h1>
                    <div class="total-clicks">
                        <strong>
                            Clicks:
                        </strong>
                        <p>
                            0
                        </p>
                    </div>
                    <div class="total-fork-jabs">
                        <strong>
                            Fork Jabs:
                        </strong>
                        <p>
                            0
                        </p>
                    </div>
                    <div class="total-meatballs-gained">
                        <strong>
                            Meatballs Gained:
                        </strong>
                        <p>
                            0
                        </p>
                    </div>
                    <div class="total-meatballs-spent">
                        <strong>
                            Meatballs Spent:
                        </strong>
                        <p>
                            0
                        </p>
                    </div>
                    <div class="total-upgrades-bought">
                        <strong>
                            Upgrades Bought:
                        </strong>
                        <p>
                            0
                        </p>
                    </div>
                    <div class="total-rebirths">
                        <strong>
                            Rebirths:
                        </strong>
                        <p>
                            0
                        </p>
                    </div>
                </div>
                
                <div>
                    <button class="rebirth-button disabled">Rebirth: +0.00%</button>
                    <strong class="rebirth-upgrades-needed-full">
                        <strong>
                            Upgrades Needed:
                        </strong>
                        <p class="rebirth-upgrades-needed">
                            55
                        </p>
                    </strong>
                </div>
            </div>
            <div class="content">
                <div class="meatball-count">
                    <img src="images/meatball.png" width="65px" alt="Meatballs:" draggable="false">
                    <p>0</p>
                    <div>
                        <strong>x1.00</strong>
                    </div>
                </div>
            </div>
            <div class="shop">
                <button class="buy-click-upgrade-button shop-button">
                    <div>
                        <img src="images/cursor-upgrade.png" width="150" alt="Buy Click Upgrade" draggable="false">
                        <div>
                            <h2>Click Value</h2>
                            <div>Increases click value by 0.5</div>
                            <h3>1/50</h3>
                        </div>
                    </div>
                    <p><img src="images/meatball.png" width="65px" alt="Cost:" draggable="false"><strong>10</strong></p>
                </button>

                <button class="buy-fork-button shop-button">
                    <div>
                        <img src="images/fork-upgrade.png" width="150" alt="Buy Fork" draggable="false">
                        <div>
                            <h2>Fork</h2>
                            <div>Adds 1 fork with 1 CPS</div>
                            <h3>0/40</h3>
                        </div>
                    </div>
                    <p><img src="images/meatball.png" width="65px" alt="Cost:" draggable="false"><strong>50</strong></p>
                </button>

                <button class="buy-multiplier-upgrade-button shop-button">
                    <div>
                        <img src="images/multiplier-upgrade.png" width="150" alt="Buy Multiplier" draggable="false">
                        <div>
                            <h2>Multiplier</h2>
                            <div>Increases multiplier by 0.10</div>
                            <h3>0/20</h3>
                        </div>
                    </div>
                    <p><img src="images/meatball.png" width="65px" alt="Cost:" draggable="false"><strong>100</strong></p>
                </button>
                
            </div>
        </div>

        <div class="fork-container">
            
        </div>

        <button class="click-button">
            <img src="images/pastaBowl.png" width="250px" alt="Pasta Bowl" draggable="false">
        </button>
    </body>
</html>
